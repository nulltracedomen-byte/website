<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обращение к Леону</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.container {
    text-align: center;
    max-width: 700px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(255, 0, 0, 0.2);
    animation: fadeIn 1.2s ease;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #ff4d4d, #ff0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: 18px;
    opacity: 0.7;
    margin-bottom: 30px;
}

.highlight {
    font-weight: 600;
    color: #ff4d4d;
}

.counter {
    font-size: 40px;
    margin: 20px 0;
    color: #fff;
}

button {
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #ff4d4d, #ff0000);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px red;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.footer {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.4;
}
</style>
</head>

<body>

<div class="container">
    <h1>Леон Мотовских, пора действовать</h1>

    <div class="subtitle">
        Общественность уже давно ждёт, когда вы <span class="highlight">заблокируете сайт географу</span>
    </div>

    <div class="counter" id="counter">1024 человек ждут</div>

    <button onclick="increase()">Поддержать давление</button>

    <div class="footer">
        *Стоит задуматься. ДА
    </div>
</div>

<script>
let count = 999;

function increase() {
    count += Math.floor(Math.random() * 10) + 1;
    document.getElementById("counter").innerText = count + " человек ждут";

    if (count > 1100) {
        document.body.style.boxShadow = "inset 0 0 100px red";
    }
}
</script>

</body>
</html>
